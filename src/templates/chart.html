{% macro chart(name, id) %}
<div class="card bg-base-200 border border-base-300 shadow-sm">
  <div class="card-body p-5">
    <h2 class="text-xs uppercase tracking-widest text-base-content/40 mb-4">
      {{ name }}
    </h2>
    <div style="position: relative; height: 200px">
      <canvas id={{id}}></canvas>
    </div>
  </div>
</div>
{% endmacro %}
