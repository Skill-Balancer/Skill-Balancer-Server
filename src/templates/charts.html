{% import "chart.html" as chart %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<div class="grid grid-cols-1 gap-4 mb-8">
  {{ chart::chart("Reward", "chartReward") }}
  {{ chart::chart("Loss", "chartLoss") }}
  {{ chart::chart("Entropy & Clip Fraction", "chartEntropy") }}
</div>

<script>
  Chart.defaults.color = "rgba(255,255,255,0.35)";
  Chart.defaults.borderColor = "rgba(255,255,255,0.07)";

  const sharedOpts = {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: {
        display: true,
        labels: {
          boxWidth: 12,
          boxHeight: 2,
          font: {size: 11, family: "ui-monospace, monospace"},
          color: "rgba(255,255,255,0.5)",
        },
      },
    },
    scales: {
      x: {
        ticks: {maxTicksLimit: 8, font: {size: 10}},
        grid: {color: "rgba(255,255,255,0.05)"},
      },
      y: {
        ticks: {font: {size: 10}},
        grid: {color: "rgba(255,255,255,0.05)"},
      },
    },
  };

  const MAX_POINTS = 60;
  const steps = [],
    rewards = [],
    policyLosses = [],
    valueLosses = [],
    entropies = [],
    clips = [];

  function update_charts() {
    chartReward.update("none");
    chartLoss.update("none");
    chartEntropy.update("none");
  }
  // ── Chart definitions ─────────────────────────────────────────────────────────

  const chartReward = new Chart(document.getElementById("chartReward"), {
    type: "line",
    data: {
      labels: steps,
      datasets: [
        {
          label: "Mean reward",
          data: rewards,
          borderColor: "#34d399",
          backgroundColor: "rgba(52,211,153,0.07)",
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
        },
      ],
    },
    options: sharedOpts,
  });

  const chartLoss = new Chart(document.getElementById("chartLoss"), {
    type: "line",
    data: {
      labels: steps,
      datasets: [
        {
          label: "Policy loss",
          data: policyLosses,
          borderColor: "#f87171",
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
        },
        {
          label: "Value loss",
          data: valueLosses,
          borderColor: "#60a5fa",
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
        },
      ],
    },
    options: sharedOpts,
  });

  const chartEntropy = new Chart(document.getElementById("chartEntropy"), {
    type: "line",
    data: {
      labels: steps,
      datasets: [
        {
          label: "Entropy",
          data: entropies,
          borderColor: "#a78bfa",
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
        },
        {
          label: "Clip fraction",
          data: clips,
          borderColor: "#fbbf24",
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
          borderDash: [4, 3],
        },
      ],
    },
    options: sharedOpts,
  });
</script>
