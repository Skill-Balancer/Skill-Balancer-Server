<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<div class="grid grid-cols-1 gap-4 mb-8">
  <div class="card bg-base-200 border border-base-300 shadow-sm">
    <div class="card-body p-5">
      <h2 class="text-xs uppercase tracking-widest text-base-content/40 mb-4">Reward &amp; Loss</h2>
      <div style="position: relative; height: 200px;">
        <canvas id="chartReward"></canvas>
      </div>
    </div>
  </div>

  <div class="card bg-base-200 border border-base-300 shadow-sm">
    <div class="card-body p-5">
      <h2 class="text-xs uppercase tracking-widest text-base-content/40 mb-4">Entropy &amp; Clip Fraction</h2>
      <div style="position: relative; height: 160px;">
        <canvas id="chartEntropy"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
  Chart.defaults.color = 'rgba(255,255,255,0.35)';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.07)';

  const MAX_POINTS = 60;
  const steps = [], rewards = [], policyLosses = [], valueLosses = [], entropies = [], clips = [];

  const sharedOpts = {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: {
        display: true,
        labels: {
          boxWidth: 12,
          boxHeight: 2,
          font: { size: 11, family: 'ui-monospace, monospace' },
          color: 'rgba(255,255,255,0.5)',
        }
      }
    },
    scales: {
      x: {
        ticks: { maxTicksLimit: 8, font: { size: 10 } },
        grid: { color: 'rgba(255,255,255,0.05)' },
      },
      y: {
        ticks: { font: { size: 10 } },
        grid: { color: 'rgba(255,255,255,0.05)' },
      }
    },
  };

  const chartReward = new Chart(document.getElementById('chartReward'), {
    type: 'line',
    data: {
      labels: steps,
      datasets: [
        {
          label: 'Mean reward',
          data: rewards,
          borderColor: '#34d399',
          backgroundColor: 'rgba(52,211,153,0.07)',
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
        },
        {
          label: 'Policy loss',
          data: policyLosses,
          borderColor: '#f87171',
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
        },
        {
          label: 'Value loss',
          data: valueLosses,
          borderColor: '#60a5fa',
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
        },
      ],
    },
    options: sharedOpts,
  });

  const chartEntropy = new Chart(document.getElementById('chartEntropy'), {
    type: 'line',
    data: {
      labels: steps,
      datasets: [
        {
          label: 'Entropy',
          data: entropies,
          borderColor: '#a78bfa',
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
        },
        {
          label: 'Clip fraction',
          data: clips,
          borderColor: '#fbbf24',
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
          borderDash: [4, 3],
        },
      ],
    },
    options: sharedOpts,
  });

  function push(arr, val) {
    arr.push(val);
    if (arr.length > MAX_POINTS) arr.shift();
  }

  function flash(id) {
    const el = document.getElementById(id);
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function clearData() {
    [steps, rewards, policyLosses, valueLosses, entropies, clips].forEach(a => a.length = 0);
    chartReward.update('none');
    chartEntropy.update('none');
    ['card-step', 'card-reward', 'card-entropy', 'card-clip'].forEach(id => {
      document.getElementById(id).textContent = '—';
    });
  }

  const source = new EventSource('/metrics');
  source.addEventListener('metrics', (e) => {
    const m = JSON.parse(e.data);

    push(steps, m.step);
    push(rewards, m.mean_reward);
    push(policyLosses, m.policy_loss);
    push(valueLosses, m.value_loss);
    push(entropies, m.entropy);
    push(clips, m.clip_fraction);

    chartReward.update('none');
    chartEntropy.update('none');

    document.getElementById('card-step').textContent    = m.step;
    document.getElementById('card-reward').textContent  = m.mean_reward.toFixed(4);
    document.getElementById('card-entropy').textContent = m.entropy.toFixed(4);
    document.getElementById('card-clip').textContent    = m.clip_fraction.toFixed(4);

    flash('card-reward');
    flash('card-entropy');
    flash('card-clip');
  });

  source.onerror = () => console.warn('SSE connection lost, retrying...');
</script>
