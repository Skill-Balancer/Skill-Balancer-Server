name: Build All Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-binaries:
    strategy:
        matrix:
            include:
                - os: "ubuntu-latest"
                  target: x86_64-unknown-linux-gnu
                - os: "windows-latest"
                  target: x86_64-pc-windows-msvc
                - os: "macos-latest"
                  target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add targets
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
            name: Skill-Balancer-Server
            path: target/${{ matrix.target }}/release/Skill-Balancer-Server*

  build-release:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/Skill-Balancer-Server*
          tag_name: "Skill Balancer Server Binaries"
          body: "Automated release of ${{ github.ref_name }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}